<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#8B5CF6" id="theme-color">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="rawmaps">
<title>RawMaps · Oporto</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Archivo+Expanded:wght@700;800;900&family=Outfit:wght@700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --paper:#F6F4EF;--card:#FFFFFF;--ink:#141414;--ink2:#5b5650;--ink3:#9a958c;
  --line:rgba(20,20,20,.10);--line2:rgba(20,20,20,.18);
  --acc:#8B5CF6;--acc-rgb:139,92,246;
  --nu:'Outfit',sans-serif;--name:'Archivo Expanded','Archivo',sans-serif;--ui:'Archivo',sans-serif;--body:'DM Sans',sans-serif;--mono:'DM Sans',sans-serif;/* data/labels: no monospace in the brand */
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
html,body{height:100%}
html{background:rgba(var(--acc-rgb),.05)}
body{font-family:var(--body);color:var(--ink);background:rgba(var(--acc-rgb),.05);overflow:hidden}
#app{height:100dvh;max-width:480px;margin:0 auto;background:var(--paper);display:flex;flex-direction:column;position:relative;overflow:hidden;border-left:1px solid rgba(var(--acc-rgb),.15);border-right:1px solid rgba(var(--acc-rgb),.15)}

/* install banner */
#install-banner{flex-shrink:0;display:none;align-items:center;gap:10px;padding:9px 14px;background:var(--ink);color:#fff}
#install-banner.on{display:flex}
#ib-t{flex:1;font-family:var(--body);font-size:12.5px;font-weight:500}
#ib-btn{font-family:var(--ui);font-weight:800;font-size:11px;background:var(--acc);color:#fff;border:none;border-radius:8px;padding:7px 13px;cursor:pointer}
#ib-x{width:26px;height:26px;min-width:26px;border:none;background:rgba(255,255,255,.14);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}

/* header */
#header{flex-shrink:0;background:var(--card);padding:calc(var(--safe-t) + 12px) 14px 0;border-bottom:1px solid var(--line);z-index:7}
#header-top{display:flex;align-items:center;justify-content:space-between}
#logo{display:flex;align-items:baseline;gap:9px}
#logo-word{font-family:var(--nu);font-weight:800;font-size:17px;letter-spacing:-.03em;color:var(--ink)}
#logo-acc{color:var(--acc)}
#logo-sub{font-family:var(--body);font-size:10px;font-weight:400;color:var(--ink3)}
#header-actions{display:flex;align-items:center;gap:7px}
#lang-tog{display:inline-flex;align-items:center;gap:5px;font-family:var(--ui);font-weight:800;font-size:11px;color:var(--ink2);background:transparent;border:1.5px solid var(--line2);border-radius:8px;padding:6px 9px;cursor:pointer}
#lang-tog svg{width:14px;height:14px}
.h-btn{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--line2);background:var(--card);color:var(--ink2);display:flex;align-items:center;justify-content:center;cursor:pointer}
.h-btn svg{width:17px;height:17px}
#days{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:11px 0 11px;margin-right:-14px}
#days::-webkit-scrollbar{display:none}
.dc{flex-shrink:0;font-family:var(--ui);font-weight:800;font-size:11px;height:30px;padding:0 14px;border-radius:100px;display:inline-flex;align-items:center;white-space:nowrap;cursor:pointer;border:1px solid var(--line2);background:var(--card);color:var(--ink3);transition:.12s}
.dc.before{background:var(--ink);color:#fff;border-color:var(--ink)}
.dc.on{background:var(--acc);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(var(--acc-rgb),.35)}

/* stage: map fills, place card overlays */
#stage{flex:1;position:relative;overflow:hidden;min-height:0}
#mzone{position:absolute;inset:0;background:#E6E3DB;overflow:hidden}
#mz-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--ink3)}
#mz-placeholder svg{width:40px;height:40px;opacity:.4}
/* iframe pushed up to clip MyMaps' grey title bar; #mz-top-bar covers the rest */
#mframe{position:absolute;left:0;right:0;top:-58px;width:100%;height:calc(100% + 58px);border:0;opacity:0;transition:opacity .35s}
#mframe.vis{opacity:1}
/* locks the inline map: blocks Google's pin menu + pan/zoom. Full map via the ⤢ button stays interactive */
#mz-lock{position:absolute;inset:0;z-index:2;background:transparent;touch-action:none;cursor:default}
#mz-top-bar{position:absolute;top:0;left:0;right:0;z-index:4;display:flex;align-items:center;gap:9px;background:var(--card);padding:9px 10px;border-bottom:1px solid var(--line)}
#ab-go{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:7px;height:44px;border-radius:11px;background:var(--acc);color:#fff;font-family:var(--ui);font-weight:800;font-size:13.5px;text-decoration:none;box-shadow:0 5px 14px rgba(var(--acc-rgb),.4)}
#ab-go svg{width:16px;height:16px}
#mz-mm-btn{width:44px;height:44px;flex-shrink:0;border-radius:11px;border:1px solid var(--line2);background:var(--card);color:var(--ink2);display:flex;align-items:center;justify-content:center;cursor:pointer}
#mz-mm-btn svg{width:19px;height:19px}
#mz-overlay{display:none}/* old map-name label, replaced by the #mz-here chip */
/* current-stop reference chip: shows which pin is active, tap to open the full map */
#mz-here{position:absolute;top:66px;left:10px;z-index:3;display:inline-flex;align-items:center;gap:8px;max-width:calc(100% - 60px);height:36px;padding:3px 13px 3px 3px;background:var(--card);border:1px solid var(--line2);border-radius:100px;box-shadow:0 2px 8px rgba(0,0,0,.14);cursor:pointer}
#mz-here-ico{width:30px;height:30px;border-radius:50%;background:var(--acc);flex-shrink:0;display:flex;align-items:center;justify-content:center}
#mz-here-img{width:15px;height:15px;display:block}
#mz-here-name{font-family:var(--ui);font-weight:700;font-size:12.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#mz-left{background:rgba(255,255,255,.92);backdrop-filter:blur(4px);border:1px solid var(--line);border-radius:9px;padding:6px 10px}
#mz-type{font-family:var(--mono);font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--acc)}
#mz-name{font-family:var(--ui);font-weight:700;font-size:12px;color:var(--ink);line-height:1.2;margin-top:1px}
#mstripe{display:none}
#sbadge{position:absolute;top:64px;right:10px;z-index:3;display:none;align-items:center;gap:4px;background:var(--acc);color:#fff;border-radius:100px;padding:4px 10px 4px 8px}
#sbadge.on{display:none}/* removed: not needed */
#sbadge svg{width:12px;height:12px}
#sbadge-t{font-family:var(--ui);font-weight:800;font-size:9px;letter-spacing:.08em}

/* place card */
#place{position:absolute;left:0;right:0;bottom:0;height:300px;background:var(--card);border-top:1px solid var(--line2);border-radius:18px 18px 0 0;box-shadow:0 -10px 28px rgba(0,0,0,.14);display:flex;flex-direction:column;z-index:5}
#nav-mid{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line);flex-shrink:0}
#nbp,#nbn{width:44px;height:42px;border-radius:11px;border:1px solid var(--line2);background:transparent;color:var(--ink2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
#nbn{background:var(--acc);color:#fff;border-color:transparent;box-shadow:0 5px 14px rgba(var(--acc-rgb),.35)}
#nbp svg,#nbn svg{width:20px;height:20px}
#prog-wrap{flex:1;min-width:0}
#prog-inner{position:relative;height:14px;display:flex;align-items:center}
#prog-line{position:absolute;left:0;right:0;height:3px;background:var(--line2);border-radius:2px}
#prog-fill{position:absolute;left:0;height:3px;background:var(--acc);border-radius:2px;transition:width .25s}
#prog-dots{position:absolute;left:0;right:0;display:flex;justify-content:space-between;align-items:center}
.pdot{width:6px;height:6px;border-radius:50%;background:var(--line2)}
.pdot.done{background:var(--acc)}
.pdot.key{width:9px;height:9px;border:1.5px solid var(--line2);background:var(--card)}
.pdot.key.done{border-color:var(--acc);background:var(--acc)}
.pdot.cur{width:12px;height:12px;border:2px solid var(--acc);background:var(--card)}
#prog-ct{display:none}/* count already shown in the card header; keep the line centered with the buttons */
#milestone{display:none}
#cw{flex:1;min-height:0;position:relative}
#card{height:100%;overflow:hidden}
#cbody-wrap{height:100%;position:relative}
#cbody{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:13px 18px 22px}
#eyebrow{font-family:var(--mono);font-size:10.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);margin-bottom:7px;display:flex;align-items:center;flex-wrap:wrap;gap:8px}
#eyebrow .friki{background:#F3E8FF;color:#7C3AED;padding:2px 7px;border-radius:4px;letter-spacing:.06em}
#eyebrow .rating{color:var(--ink3);letter-spacing:.04em}
#eyebrow .star{color:#F5A623}
#name{font-family:var(--name);font-weight:800;font-size:21px;line-height:1.1;letter-spacing:-.015em;color:var(--ink);margin-bottom:9px}
#facts{display:flex;flex-direction:column;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:14px}
#facts .fc{display:flex;gap:14px;align-items:baseline;padding:8px 2px;border-bottom:1px solid var(--line)}
#facts .fc:last-child{border-bottom:none}
#facts .fcl{flex:0 0 60px;font-family:var(--mono);font-size:8.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3)}
#facts .fcv{flex:1;font-family:var(--mono);font-weight:500;font-size:13px;color:var(--ink);line-height:1.4}
#tip{display:none;margin-bottom:13px;border-left:3px solid var(--acc);padding:2px 0 2px 13px}
#tip.on{display:block}
#tip .tipl{font-family:var(--mono);font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--acc);display:flex;align-items:center;gap:5px;margin-bottom:4px}
#tip .tipl svg{width:11px;height:11px}
#tip p{font-family:var(--body);font-weight:300;font-size:12.5px;line-height:1.55;color:var(--ink2)}
#desc{font-family:var(--body);font-weight:300;font-size:13.5px;line-height:1.62;color:var(--ink);white-space:pre-line}
#scroll-fade{position:absolute;left:0;right:0;bottom:0;height:34px;background:linear-gradient(transparent,var(--card));pointer-events:none;opacity:0;transition:.2s}
#scroll-fade.on{opacity:1}
#scroll-cta{position:absolute;left:50%;bottom:6px;transform:translateX(-50%);width:30px;height:30px;border-radius:50%;background:var(--card);border:1px solid var(--line2);display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.1)}
#scroll-cta.on{display:flex}
#scroll-cta svg{width:16px;height:16px}

/* generic overlays */
.ov{position:absolute;inset:0;background:rgba(0,0,0,.42);opacity:0;pointer-events:none;transition:.2s;z-index:20}
.ov.on{opacity:1;pointer-events:auto}
.sheet{position:absolute;left:0;right:0;bottom:0;max-height:86%;background:var(--paper);border-radius:22px 22px 0 0;transform:translateY(102%);transition:transform .28s cubic-bezier(.2,.8,.2,1);z-index:21;display:flex;flex-direction:column;overflow:hidden;padding-bottom:var(--safe-b)}
.sheet.on{transform:translateY(0)}
.mpull{width:38px;height:4px;border-radius:3px;background:var(--line2);margin:10px auto 4px}

/* search */
#search-ov{position:absolute;inset:0;background:var(--paper);transform:translateX(103%);transition:transform .24s cubic-bezier(.2,.8,.2,1);z-index:30;display:flex;flex-direction:column;padding-top:var(--safe-t)}
#search-ov.on{transform:translateX(0)}
#search-bar{display:flex;gap:9px;align-items:center;padding:13px 14px;border-bottom:1px solid var(--line)}
#search-input{flex:1;height:40px;border:1.5px solid var(--line2);border-radius:11px;background:var(--card);padding:0 14px;font-family:var(--body);font-size:14px;color:var(--ink);outline:none}
#search-input:focus{border-color:var(--acc)}
#search-close{width:36px;height:36px;border-radius:9px;border:1.5px solid var(--line2);background:transparent;color:var(--ink2);display:flex;align-items:center;justify-content:center;cursor:pointer}
#search-close svg{width:16px;height:16px}
#search-results{flex:1;overflow-y:auto;padding:6px 0}
.sr{display:flex;gap:11px;align-items:flex-start;padding:11px 16px;cursor:pointer;border-bottom:1px solid var(--line)}
.sr-chip{flex-shrink:0;font-family:var(--mono);font-size:9px;color:#fff;padding:3px 7px;border-radius:5px;margin-top:1px}
.sr-name{font-family:var(--ui);font-weight:700;font-size:13.5px;color:var(--ink)}
.sr-desc{font-family:var(--body);font-weight:300;font-size:11.5px;color:var(--ink3);line-height:1.4;margin-top:2px}

/* install sheet */
#install-sheet .ish{font-family:var(--name);font-weight:800;font-size:19px;color:var(--ink);padding:4px 22px 2px}
#install-sheet .isub{font-family:var(--body);font-size:12.5px;color:var(--ink3);padding:0 22px 14px}
.is{display:flex;gap:12px;align-items:flex-start;padding:12px 22px;border-top:1px solid var(--line)}
.is-num{flex-shrink:0;width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--ui);font-weight:800;font-size:12px;color:#fff}
.is-t{display:block;font-family:var(--ui);font-weight:700;font-size:13px;color:var(--ink);margin-bottom:3px}
.is-s{display:block;font-family:var(--body);font-weight:300;font-size:12px;color:var(--ink2);line-height:1.5}
.is-tag{display:inline-flex;min-width:20px;height:20px;padding:0 5px;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--line2);border-radius:5px;font-family:var(--mono);font-size:11px;color:var(--ink)}
#install-ok{margin:14px 22px;height:48px;border-radius:12px;border:none;background:var(--acc);color:#fff;font-family:var(--ui);font-weight:800;font-size:14px;cursor:pointer}

/* options menu */
#msh .mhd{font-family:var(--name);font-weight:800;font-size:18px;padding:2px 20px 10px;color:var(--ink)}
.mr{display:flex;align-items:center;gap:13px;padding:13px 20px;border-top:1px solid var(--line);cursor:pointer}
.mico{width:38px;height:38px;flex-shrink:0;border-radius:10px;background:rgba(var(--acc-rgb),.1);color:var(--acc);display:flex;align-items:center;justify-content:center}
.mico svg{width:19px;height:19px}
.mtt{display:block;font-family:var(--ui);font-weight:700;font-size:14px;color:var(--ink)}
.mts{display:block;font-family:var(--body);font-weight:300;font-size:11.5px;color:var(--ink3);margin-top:1px}
.marr{margin-left:auto;color:var(--ink3)}.marr svg{width:16px;height:16px}
#mcnc{margin:12px 20px;height:46px;border-radius:12px;border:1px solid var(--line2);background:transparent;color:var(--ink2);font-family:var(--ui);font-weight:700;font-size:14px;cursor:pointer}

/* etsy nudge */
#etsy-nudge{position:absolute;left:14px;right:14px;bottom:calc(14px + var(--safe-b));background:var(--ink);color:#fff;border-radius:16px;padding:16px;z-index:22;display:none;box-shadow:0 12px 30px rgba(0,0,0,.3)}
#etsy-nudge.on{display:block}
#en-close{position:absolute;top:8px;right:10px;background:none;border:none;color:rgba(255,255,255,.5);font-size:16px;cursor:pointer}
#en-stars{display:flex;gap:3px;color:#FFC53D;margin-bottom:9px}
#en-stars svg{width:15px;height:15px}
#en-title{font-family:var(--ui);font-weight:800;font-size:14px;margin-bottom:3px}
#en-sub{font-family:var(--body);font-weight:300;font-size:12px;color:rgba(255,255,255,.65);margin-bottom:12px}
#en-btn{display:inline-block;background:var(--acc);color:#fff;text-decoration:none;font-family:var(--ui);font-weight:800;font-size:12.5px;padding:9px 16px;border-radius:9px}

/* full map sheet */
#map-sh{height:90%;max-height:90%;background:var(--paper);border-radius:22px 22px 0 0;overflow:hidden;display:flex;flex-direction:column}
#map-bar{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--line)}
#map-bar-title{font-family:var(--nu);font-weight:800;font-size:15px;color:var(--ink)}
#map-close{width:30px;height:30px;border-radius:50%;border:1px solid var(--line2);background:transparent;color:var(--ink2);display:flex;align-items:center;justify-content:center;cursor:pointer}
#map-frame{flex:1;width:100%;border:0}

/* antes overlay — full height, scrollable */
#antes-sh{height:100%;max-height:100%;border-radius:0;padding-top:var(--safe-t)}
.antes-hd{flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:8px 20px 14px;border-bottom:1px solid var(--line)}
.antes-ttl{font-family:var(--name);font-weight:800;font-size:20px;color:var(--ink)}
.antes-sub{font-family:var(--body);font-size:12px;color:var(--ink3);margin-top:3px}
#antes-close{flex-shrink:0;width:30px;height:30px;border-radius:50%;border:none;background:var(--line);color:var(--ink2);font-size:16px;cursor:pointer}
#antes-body{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 20px calc(28px + var(--safe-b))}
.antes-sec{padding:14px 0 4px}
.antes-lbl{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--acc);margin-bottom:10px}
.antes-row{display:flex;gap:12px;margin-bottom:13px}
.ar-ico{flex-shrink:0;font-size:18px;line-height:1.2;width:24px;text-align:center}
.ar-name{font-family:var(--ui);font-weight:700;font-size:13.5px;color:var(--ink);margin-bottom:3px}
.ar-desc{font-family:var(--body);font-weight:300;font-size:12.5px;line-height:1.55;color:var(--ink2)}
.ar-desc b{font-weight:700;color:var(--ink)}
.ar-tag{display:inline-block;font-family:var(--mono);font-size:9.5px;padding:3px 8px;border-radius:5px;margin-top:6px;line-height:1.4}
.ar-tag-fk{background:#F3E8FF;color:#7C3AED}
.ar-tag-rec{background:#FEF3C7;color:#B45309}

/* tip bar above map (kept hidden by default; content lives in card per approved design) */
#tip-bar{display:none}

/* dark mode (toggled by the menu) */
.hc{--paper:#161513;--card:#211F1B;--ink:#F2EEE6;--ink2:#B7B0A4;--ink3:#827C72;--line:rgba(255,255,255,.10);--line2:rgba(255,255,255,.22);background:#100F0D}
.hc #install-banner{background:#0D0C0B}
.hc #etsy-nudge{background:#0D0C0B}
.hc .dc.before{background:rgba(255,255,255,.14);color:var(--ink)}
.hc #ab-go,.hc #nbn,.hc .dc.on{color:#fff!important}

/* touch press */
.pressed{opacity:.55;transform:scale(.94)}
.dc,.h-btn,#ab-go,#nbn,#nbp,#mz-mm-btn,.mr,#ib-btn{transition:transform .1s,opacity .1s}

@media print{body,#app{display:none!important}}
</style>
<script defer src="https://cloud.umami.is/script.js" data-website-id="1181f74a-5afa-4d5f-8915-95b726616e6c"></script>
</head>

    <button id="ib-x" onclick="dismissInstall()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>

  <div id="header">
    <div id="header-top">
      <div id="logo">
        <div id="logo-word">raw<span id="logo-acc">maps</span></div>
        <div id="logo-sub"><span id="logo-city"></span></div>
      </div>
