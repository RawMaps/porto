<script>
const D=window.D, META=D.meta, STR=D.strings, TM=D.transport, MS=D.milestones, ANTES=D.antes, SPOTS=D.spots;
const GLY=window.GLYPHS||{};
const DAYS=META.days, DACC=META.palette, DRGB=META.palette_rgb, MM=META.map;
const ORDER=Object.keys(DAYS);
const FACTL={price:{es:'Precio',en:'Price'},time:{es:'Tiempo',en:'Time'},hours:{es:'Horario',en:'Hours'}};
const TIPL={es:'Consejo',en:'Tip'};
let _lang=META.lang_default, _day='d1', _idx=0, _hc=false, _mfT=null;
const $=id=>document.getElementById(id);

function t(k){return (STR[k]&&STR[k][_lang])||(STR[k]&&STR[k].es)||'';}
function L(s,b){return (_lang==='en'&&s[b+'_en'])?s[b+'_en']:(s[b]||'');}
function spotsFor(d){return SPOTS.filter(s=>s.day===d);}
function dLabel(d){const l=DAYS[d].label;return _lang==='en'?l.replace('Día','Day'):l;}

/* state */
const LS='rawmaps_porto';
function loadState(){try{const s=JSON.parse(localStorage.getItem(LS)||'{}');_lang=s.lang||META.lang_default;_day=s.day&&DAYS[s.day]?s.day:'d1';_idx=parseInt(s.idx||'0')||0;_hc=!!s.hc;}catch(e){}}
function saveState(){try{localStorage.setItem(LS,JSON.stringify({lang:_lang,day:_day,idx:_idx,hc:_hc}));}catch(e){}}

function applyAcc(){document.documentElement.style.setProperty('--acc',DACC[_day]||'#6B7280');document.documentElement.style.setProperty('--acc-rgb',DRGB[_day]||'107,114,128');$('theme-color').setAttribute('content',DACC[_day]||'#6B7280');}

function renderDays(){
  let h=`<div class="dc before" onclick="openAntes()">${t('antes')}</div>`;
  ORDER.forEach(d=>{h+=`<div class="dc ${d===_day?'on':''}" onclick="selDay('${d}')">${dLabel(d)}</div>`;});
  $('days').innerHTML=h;
}
function getTransportMode(s){const m=TM[s.icon];return m?(m[_lang]||m.es):t('transit');}

function loadMap(s){
  const mid=MM[_lang]||MM.es; const lat=s.lat||41.1496, lng=s.lng||-8.6109; const z=s.lat?16:13;
  const url=`https://www.google.com/maps/d/embed?mid=${mid}&ll=${lat},${lng}&z=${z}&output=embed`;
  const f=$('mframe');
  if(f.getAttribute('src')!==url){f.classList.remove('vis');clearTimeout(_mfT);f.addEventListener('load',()=>f.classList.add('vis'),{once:true});_mfT=setTimeout(()=>{f.src=url;},90);}else{f.classList.add('vis');}
}

function renderCard(){
  const arr=spotsFor(_day);const s=arr[_idx]||arr[0];if(!s)return;
  const isT=s.type==='transport';
  // eyebrow
  let eb=`<span>${dLabel(_day)} · ${_idx+1} / ${arr.length}</span>`;
  if(isT)eb+=`<span class="rating">${getTransportMode(s)}${s.lines?' · '+s.lines:''}</span>`;
  else{ if(s.isFriki)eb+=`<span class="friki">${t('friki')}</span>`; if(s.rating)eb+=`<span class="rating"><span class="star">★</span> ${(''+s.rating).split(' ')[0]} Google</span>`; }
  $('eyebrow').innerHTML=eb;
  $('name').textContent=L(s,'name');
  // facts
  let fh='';['price','time','hours'].forEach(k=>{let v=s[k];if(v){fh+=`<div class="fc"><span class="fcl">${FACTL[k][_lang]}</span><span class="fcv">${v}</span></div>`;}});
  $('facts').innerHTML=fh; $('facts').style.display=fh?'flex':'none';
  // tip (above desc)
  const tip=L(s,'tip');
  if(tip){$('tip').classList.add('on');$('tip-l').textContent=TIPL[_lang];$('tip-p').textContent=tip;}else{$('tip').classList.remove('on');}
  $('desc').textContent=L(s,'desc');
  // milestone (kept, hidden)
  const ms=MS[s.name]||MS[s.name_en];$('ms-text').textContent=ms||'';
  // map overlay + sbadge
  $('mz-type').textContent=isT?getTransportMode(s):(s.isFriki?t('friki'):dLabel(_day));
  $('mz-name').textContent=L(s,'name');
  $('mz-here-name').textContent=L(s,'name');
  const gly=GLY[s.icon]; $('mz-here-img').src=gly||''; $('mz-here-img').style.display=gly?'block':'none';
  $('sbadge').classList.toggle('on',_idx===0);$('sbadge-t').textContent=t('start');
  // take me there
  $('ab-go').href=s.maps||('https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(L(s,'name')+' Porto'));
  $('lgo').textContent=t('llevame');
  renderProg();loadMap(s);saveState();
  requestAnimationFrame(()=>{$('cbody').scrollTop=0;updateScrollFade();});
}
function renderProg(){
  const arr=spotsFor(_day);
  let dh='';arr.forEach((s,i)=>{let c='pdot';if(s.intensity===1)c+=' key';if(i<_idx)c+=' done';else if(i===_idx)c+=' cur';dh+=`<span class="${c}"></span>`;});
  $('prog-dots').innerHTML=dh;
  $('prog-fill').style.width=(arr.length<2?0:(_idx/(arr.length-1))*100)+'%';
  $('prog-ct').textContent=(_idx+1)+'/'+arr.length;
}
function go(d){const arr=spotsFor(_day);_idx=Math.max(0,Math.min(arr.length-1,_idx+d));renderCard();}
function selDay(d){_day=d;_idx=0;applyAcc();renderDays();renderCard();}
function goToSpot(d,i){_day=d;_idx=i;applyAcc();renderDays();renderCard();closeSearch();}

/* scroll fade */
function updateScrollFade(){const c=$('cbody');const more=c.scrollHeight-c.clientHeight-c.scrollTop>12;$('scroll-fade').classList.toggle('on',more);$('scroll-cta').classList.toggle('on',more&&c.scrollTop<8);}
function scrollCard(){$('cbody').scrollBy({top:160,behavior:'smooth'});}

/* i18n */
function swLang(){_lang=_lang==='es'?'en':'es';applyI18n();renderDays();renderCard();renderAntes();saveState();}
function applyI18n(){
  document.documentElement.lang=_lang;
  $('lang-tog-t').textContent=_lang==='es'?'EN':'ES';
  $('logo-city').textContent=META.title[_lang]||META.city;
  $('ib-txt').textContent=t('instbanner');$('ib-btn-txt').textContent=t('instbannerbtn');
  $('inst-title').textContent=t('insttitle');$('inst-sub').textContent=t('instsub');
  $('inst-ios-t').textContent=t('instios');$('inst-ios-d').textContent=t('instiosd');$('inst-ios-d2').textContent=t('instiosd2');
  $('inst-and-t').textContent=t('instand');$('inst-and-d').textContent=t('instandd');$('inst-and-d2').textContent=t('instandd2');
  $('inst-ok-txt').textContent=t('instok');
  $('mhd').textContent=t('opciones');
  $('mtg').textContent=t('guia');$('msg').textContent=t('guias');
  $('mtfb').textContent=t('feedback');$('msfb').textContent=t('feedbacks');
  $('mtinstall').textContent=t('install');$('msinstall').textContent=t('installs');
  $('mtlang').textContent=t('idioma');$('mslang').textContent=t('idiomas');
  $('mthc').textContent=_lang==='es'?'Modo oscuro':'Dark mode';$('mshc').textContent=_lang==='es'?'Fondo oscuro para la noche':'Dark background for night';
  $('mcnc').textContent=t('cancelar');
  $('search-input').placeholder=t('searchph');
  $('en-title').textContent=t('ennudge');$('en-sub').textContent=t('ensub');$('en-btn-txt').textContent=t('enbtntxt');
  $('antes-ttl').textContent=ANTES.title[_lang]||t('antesttl');$('antes-sub-txt').textContent=t('antessub');
}

/* options menu */
function oMenu(){$('mov').classList.add('on');$('msh').classList.add('on');}
function cMenu(){$('mov').classList.remove('on');$('msh').classList.remove('on');}
function openFeedback(){window.open('mailto:hello@rawmaps.co?subject=RawMaps%20Porto%20feedback','_blank');}
function openGuide(){window.open(_lang==='en'?'guide_en.html':'guide_es.html','_blank');}
function tHC(){_hc=!_hc;document.body.classList.toggle('hc',_hc);saveState();cMenu();}

/* install */
function showInstall(){$('install-ov').classList.add('on');$('install-sheet').classList.add('on');}
function closeInstall(){$('install-ov').classList.remove('on');$('install-sheet').classList.remove('on');}
function dismissInstall(){$('install-banner').classList.remove('on');try{localStorage.setItem(LS+'_ib','1');}catch(e){}}

/* search */
function openSearch(){$('search-ov').classList.add('on');setTimeout(()=>$('search-input').focus(),120);}
function closeSearch(){$('search-ov').classList.remove('on');}
function doSearch(q){q=(q||'').toLowerCase().trim();const box=$('search-results');if(!q){box.innerHTML='';return;}
  const hits=SPOTS.filter(s=>[L(s,'name'),L(s,'desc'),L(s,'tip'),s.price,s.lines].filter(Boolean).join(' ').toLowerCase().includes(q)).slice(0,40);
  box.innerHTML=hits.map(s=>{const arr=spotsFor(s.day),i=arr.indexOf(s),de=L(s,'desc')||'';return `<div class="sr" onclick="goToSpot('${s.day}',${i})"><span class="sr-chip" style="background:${DACC[s.day]}">${dLabel(s.day)}</span><div><div class="sr-name">${L(s,'name')}</div><div class="sr-desc">${de.slice(0,80)}${de.length>80?'…':''}</div></div></div>`;}).join('')||`<div class="sr" style="color:var(--ink3)">${t('srempty')}</div>`;}

/* antes */
function openAntes(){renderAntes();$('antes-ov').classList.add('on');$('antes-sh').classList.add('on');}
function closeAntes(){$('antes-ov').classList.remove('on');$('antes-sh').classList.remove('on');}
function renderAntes(){
  $('antes-ttl').textContent=ANTES.title[_lang]||t('antesttl');$('antes-sub-txt').textContent=t('antessub');
  let h='';
  ANTES.sections.forEach(sec=>{
    const lbl=(sec.label&&sec.label[_lang])||(STR[sec.labelKey]&&STR[sec.labelKey][_lang])||'';
    h+=`<div class="antes-sec"><div class="antes-lbl">${lbl}</div>`;
    sec.rows.forEach(r=>{
      h+=`<div class="antes-row"><div class="ar-ico">${r.icon||''}</div><div><div class="ar-name">${(r.name&&r.name[_lang])||''}</div><div class="ar-desc">${(r.desc&&r.desc[_lang])||''}</div>`;
      if(r.tag){const cls=r.tag.kind&&r.tag.kind.indexOf('rec')>-1?'ar-tag-rec':'ar-tag-fk';h+=`<span class="ar-tag ${cls}">${r.tag[_lang]||r.tag.es}</span>`;}
      h+=`</div></div>`;
    });
    h+=`</div>`;
  });
  $('antes-body').innerHTML=h;
}

/* full map sheet */
function openMyMaps(){const arr=spotsFor(_day),s=arr[_idx]||arr[0];const mid=MM[_lang]||MM.es;const lat=s.lat||41.1496,lng=s.lng||-8.6109,z=s.lat?16:13;$('map-frame').src=`https://www.google.com/maps/d/embed?mid=${mid}&ll=${lat},${lng}&z=${z}`;$('map-ov').classList.add('on');$('map-sh').style.transform='translateY(0)';}
function closeMap(){$('map-ov').classList.remove('on');$('map-sh').style.transform='translateY(102%)';}

/* etsy nudge */
function showEtsyNudge(){$('etsy-nudge').classList.add('on');}
function closeEtsyNudge(){$('etsy-nudge').classList.remove('on');try{localStorage.setItem(LS+'_en','1');}catch(e){}}
function checkEtsyNudge(){try{if(localStorage.getItem(LS+'_en'))return;}catch(e){}setTimeout(showEtsyNudge,90000);}

/* fixed content panel (map is a locked locator, so no drag needed) */
const place=$('place');
// size the panel and centre the map + ring in the visible band above it
function layoutFocus(){
  const stageH=$('stage').clientHeight;
  const topBar=$('mz-top-bar').offsetHeight||60;
  const panelH=Math.min(410,Math.round(stageH*0.58));
  place.style.height=panelH+'px';
  const cardTop=stageH-panelH;
  const center=Math.round((topBar+cardTop)/2);     // centre of the visible map band
  const LIFT=20;                                   // marker blob sits above its lat/lng point
  const top=Math.round(2*(center+LIFT)-stageH-46); // 46 = embed's internal grey title bar
  const f=$('mframe');
  f.style.top=top+'px';
  f.style.height=(stageH-top)+'px';
  updateScrollFade();
}
window.addEventListener('resize',layoutFocus);

/* touch press feedback */
document.addEventListener('touchstart',e=>{const el=e.target.closest('.dc,.h-btn,#ab-go,#nbn,#nbp,#mz-mm-btn,.mr,#ib-btn,.sr');if(el)el.classList.add('pressed');},{passive:true});
document.addEventListener('touchend',e=>{document.querySelectorAll('.pressed').forEach(el=>el.classList.remove('pressed'));},{passive:true});
$('cbody').addEventListener('scroll',updateScrollFade,{passive:true});

/* init */
function init(){
  loadState();
  if(_hc)document.body.classList.add('hc');
  applyAcc();applyI18n();renderDays();renderCard();
  try{if(localStorage.getItem(LS+'_ib'))$('install-banner').classList.remove('on');}catch(e){}
  layoutFocus();checkEtsyNudge();
}
init();
</script>
